<!DOCTYPE html>
<html>
<head>
  <title>Temp Mail Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="font-family:sans-serif; text-align:center;">

<h2>📧 Temp Mail</h2>

<button onclick="generateEmail()">Generate Email</button>
<p id="email">No email generated</p>

<button onclick="loadInbox()">Check Inbox</button>
<ul id="inbox"></ul>

<script>
let token = "";
let email = "";
let password = "123456";

// Generate Email
async function generateEmail() {
  try {
    document.getElementById("email").innerText = "Generating...";

    let res = await fetch("/api/mail/domains");
    let data = await res.json();

    if (!data["hydra:member"] || data["hydra:member"].length === 0) {
      alert("Proxy working but no domains!");
      return;
    }

    let domains = data["hydra:member"];
    let domain = domains[Math.floor(Math.random() * domains.length)].domain;

    let login = Math.random().toString(36).substring(2, 10);
    email = login + "@" + domain;

    await fetch("/api/mail/accounts", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        address: email,
        password: password
      })
    });

    let loginRes = await fetch("/api/mail/token", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        address: email,
        password: password
      })
    });

    let loginData = await loginRes.json();
    token = loginData.token;

    document.getElementById("email").innerText = email;

  } catch (err) {
    alert("Error: " + err.message);
  }
}

// Inbox
async function loadInbox() {
  try {
    if (!token) {
      alert("Generate email first!");
      return;
    }

    let res = await fetch("/api/mail/messages", {
      headers: {
        "Authorization": "Bearer " + token
      }
    });

    let data = await res.json();

    let inbox = document.getElementById("inbox");
    inbox.innerHTML = "";

    if (!data["hydra:member"] || data["hydra:member"].length === 0) {
      inbox.innerHTML = "<li>No emails yet</li>";
      return;
    }

    data["hydra:member"].forEach(mail => {
      let li = document.createElement("li");
      li.innerText = "📩 " + mail.subject;
      inbox.appendChild(li);
    });

  } catch (err) {
    alert("Inbox error: " + err.message);
  }
}
</script>

</body>
</html>
