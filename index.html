<!DOCTYPE html>
<html>
<head>
  <title>Temp Mail Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      background: #f5f5f5;
    }
    button {
      padding: 10px 15px;
      margin: 10px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 5px;
    }
    #email {
      font-weight: bold;
      margin-top: 10px;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      background: white;
      margin: 5px;
      padding: 10px;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<h2>📧 Temp Mail</h2>

<button onclick="generateEmail()">Generate Email</button>
<p id="email">No email generated</p>

<button onclick="loadInbox()">Check Inbox</button>
<ul id="inbox"></ul>

<script>
let token = "";
let email = "";
let password = "123456";

// Generate Email
async function generateEmail() {
  try {
    document.getElementById("email").innerText = "Generating...";

    let res = await fetch("https://api.mail.tm/domains", {
      headers: { "Accept": "application/json" }
    });

    let data = await res.json();

    if (!data["hydra:member"] || data["hydra:member"].length === 0) {
      alert("No domain available. Try again.");
      return;
    }

    // Random domain
    let domains = data["hydra:member"];
    let random = Math.floor(Math.random() * domains.length);
    let domain = domains[random].domain;

    let login = Math.random().toString(36).substring(2, 10);
    email = login + "@" + domain;

    // Create account
    let acc = await fetch("https://api.mail.tm/accounts", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        address: email,
        password: password
      })
    });

    if (!acc.ok) {
      alert("Account creation failed. Retry.");
      return;
    }

    // Login
    let loginRes = await fetch("https://api.mail.tm/token", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        address: email,
        password: password
      })
    });

    let loginData = await loginRes.json();

    if (!loginData.token) {
      alert("Login failed.");
      return;
    }

    token = loginData.token;

    document.getElementById("email").innerText = email;

  } catch (err) {
    alert("Error: " + err.message);
  }
}

// Load Inbox
async function loadInbox() {
  try {
    if (!token) {
      alert("Pehle email generate karo!");
      return;
    }

    let res = await fetch("https://api.mail.tm/messages", {
      headers: {
        "Authorization": "Bearer " + token
      }
    });

    let data = await res.json();

    let inbox = document.getElementById("inbox");
    inbox.innerHTML = "";

    if (!data["hydra:member"] || data["hydra:member"].length === 0) {
      inbox.innerHTML = "<li>No emails yet</li>";
      return;
    }

    data["hydra:member"].forEach(mail => {
      let li = document.createElement("li");
      li.innerText = "📩 " + mail.subject;
      inbox.appendChild(li);
    });

  } catch (err) {
    alert("Inbox Error: " + err.message);
  }
}
</script>

</body>
</html>
