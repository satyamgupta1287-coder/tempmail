<!DOCTYPE html>
<html>
<head>
  <title>Temp Mail Easy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family:sans-serif; text-align:center; }
    button { padding:10px; margin:10px; }
  </style>
</head>
<body>

<h2>📧 Temp Mail (Easy)</h2>

<button onclick="generate()">Generate Email</button>
<p id="email">No email</p>

<button onclick="check()">Check Inbox</button>
<ul id="inbox"></ul>

<script>
let login="", domain="1secmail.com";

// Generate email
function generate(){
  login = Math.random().toString(36).substring(2,10);
  document.getElementById("email").innerText = login + "@" + domain;
}

// Check inbox
async function check(){
  if(!login){
    alert("Generate email first");
    return;
  }

  let res = await fetch(`https://www.1secmail.com/api/v1/?action=getMessages&login=${login}&domain=${domain}`);
  let data = await res.json();

  let inbox = document.getElementById("inbox");
  inbox.innerHTML="";

  if(data.length === 0){
    inbox.innerHTML="<li>No emails yet</li>";
    return;
  }

  data.forEach(mail=>{
    let li=document.createElement("li");
    li.innerText=mail.subject;
    inbox.appendChild(li);
  });
}
</script>

</body>
</html>
